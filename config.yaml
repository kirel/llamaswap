# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json

logLevel: info
logToStdout: proxy
healthCheckTimeout: 900
startPort: 10001
includeAliasesInList: true
globalTTL: 0

macros:
  llama: >-
    llama-server
    --host 0.0.0.0
    --port ${PORT}
    --jinja
    --ctx-size 262144
    --threads -1
    --flash-attn on

models:
  "qwen3.6-27b":
    name: "Qwen3.6 27B MTP"
    description: "Unsloth MTP preset via Hugging Face auto-download; tuned for coding in thinking mode, with a non-thinking alias for faster direct responses"
    cmd: >-
      ${llama}
      -hf unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL
      --spec-type draft-mtp
      --spec-draft-n-max 2
    filters:
      setParams:
        top_k: 20
        min_p: 0.0
        repeat_penalty: 1.0
      setParamsByID:
        "${MODEL_ID}":
          temperature: 0.6
          top_p: 0.95
          presence_penalty: 0.0
          chat_template_kwargs:
            enable_thinking: true
        "${MODEL_ID}:nothink":
          temperature: 1.0
          top_p: 0.95
          presence_penalty: 1.5
          chat_template_kwargs:
            enable_thinking: false

  "qwen3.6-35b-a3b":
    name: "Qwen3.6 35B A3B MTP"
    description: "Unsloth MTP preset via Hugging Face auto-download; tuned for coding in thinking mode, with a non-thinking alias for faster direct responses"
    cmd: >-
      ${llama}
      -hf unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_XL
      --spec-type draft-mtp
      --spec-draft-n-max 2
    filters:
      setParams:
        top_k: 20
        min_p: 0.0
        repeat_penalty: 1.0
      setParamsByID:
        "${MODEL_ID}":
          temperature: 0.6
          top_p: 0.95
          presence_penalty: 0.0
          chat_template_kwargs:
            enable_thinking: true
        "${MODEL_ID}:nothink":
          temperature: 1.0
          top_p: 0.95
          presence_penalty: 1.5
          chat_template_kwargs:
            enable_thinking: false
